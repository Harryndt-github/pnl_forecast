services:
  - type: web
    name: pnl-forecast
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AUTH_MODE
        value: local
      - key: MSSQL_HOST
        sync: false
      - key: MSSQL_PORT
        value: "1433"
      - key: MSSQL_USER
        sync: false
      - key: MSSQL_PASSWORD
        sync: false
      - key: MSSQL_DATABASE
        sync: false
      - key: STARROCKS_HOST
        sync: false
      - key: STARROCKS_PORT
        value: "9030"
      - key: STARROCKS_USER
        sync: false
      - key: STARROCKS_PASSWORD
        sync: false
      - key: STARROCKS_DATABASE
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
