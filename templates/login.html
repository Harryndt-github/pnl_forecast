<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PnL Forecast - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { font-size: 1.5rem; color: #1f2937; margin-bottom: 0.5rem; }
        .login-box p { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .btn-google { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box; background: #ffffff; border: 1px solid #d1d5db; color: #374151; padding: 0.75rem; border-radius: 6px; font-weight: 500; cursor: pointer; text-decoration: none; margin-bottom: 1rem; transition: background 0.2s; }
        .btn-google:hover { background: #f9fafb; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; color: #9ca3af; font-size: 0.875rem; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #e5e7eb; }
        .divider:not(:empty)::before { margin-right: .5rem; }
        .divider:not(:empty)::after { margin-left: .5rem; }
        .input-group { text-align: left; margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
        .input-group input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn-primary { width: 100%; background: #2563eb; color: white; padding: 0.75rem; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: background 0.2s; font-family: inherit; font-size: 1rem;}
        .btn-primary:hover { background: #1d4ed8; }
        .error-msg { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; margin-bottom: 1rem; display: none; text-align: left;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>PnL Forecast</h2>
        <p>Đăng nhập để vào Hệ thống Máy chủ</p>

        <a href="/api/auth/google" class="btn-google">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Đăng nhập Mail Hệ thống
        </a>

        <div class="divider">HOẶC TÀI KHOẢN NỘI BỘ</div>

        <form id="loginForm">
            <div id="errorMsg" class="error-msg">Nội dung lỗi ở đây</div>
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary">Đăng nhập ngay</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = 'Đang xử lý...';
            
            const payload = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            };
            try {
                const res = await fetch('/api/auth/local/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    window.location.href = '/';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').innerText = data.message || 'Đăng nhập thất bại.';
                }
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'Lỗi kết nối máy chủ.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Đăng nhập ngay';
            }
        });
    </script>
</body>
</html>
